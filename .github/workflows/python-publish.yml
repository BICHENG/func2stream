name: Build and Publish Python Package

on:
  release:
    types: [published]
  # push:
  #   branches:
  #     - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/func2stream
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: |
        RELEASE_VERSION="${GITHUB_REF_NAME#v}" python -m build

    - name: Publish package
      uses: pypa/gh-action-pypi-publish@release/v1
